name: CI Deploy Pipeline

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      deployment_id:
        description: 'Deployment identifier (container name, secrets file)'
        required: true
        default: 'laragod'
        type: string
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  build-production-image:
    runs-on: self-hosted
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Set image tag
        id: tag
        run: |
          echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to Docker Registry
        run: |
          source ~/.github_secrets/global.env
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_LOGIN" --password-stdin localhost:5000

      - name: Build and push production image
        run: |
          docker pull localhost:5000/${{ github.event.repository.name }}:latest || true

          DOCKER_BUILDKIT=1 docker build \
            -t localhost:5000/${{ github.event.repository.name }}:${{ steps.tag.outputs.tag }} \
            -t localhost:5000/${{ github.event.repository.name }}:latest \
            --build-arg WWWGROUP=1000 \
            --build-arg BASE_REGISTRY=localhost:5000 \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from localhost:5000/${{ github.event.repository.name }}:latest \
            -f Dockerfile.prod .

          docker push localhost:5000/${{ github.event.repository.name }}:${{ steps.tag.outputs.tag }}
          docker push localhost:5000/${{ github.event.repository.name }}:latest

      - name: Run sanity checks
        run: |
          docker run --rm localhost:5000/${{ github.event.repository.name }}:${{ steps.tag.outputs.tag }} \
            sh -c "php -v && php -m | grep -i opcache"

  prepare-database:
    needs: build-production-image
    runs-on: self-hosted
    env:
      DEPLOYMENT_ID: ${{ github.event.inputs.deployment_id || github.event.repository.name }}
      ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Load secrets
        run: |
          source ~/.github_secrets/global.env
          if [ -f ~/.github_secrets/apps/$DEPLOYMENT_ID-$ENVIRONMENT.env ]; then
            source ~/.github_secrets/apps/$DEPLOYMENT_ID-$ENVIRONMENT.env
          elif [ -f ~/.github_secrets/apps/$DEPLOYMENT_ID.env ]; then
            source ~/.github_secrets/apps/$DEPLOYMENT_ID.env
          else
            echo "No app-specific secrets found"
          fi

          echo "MYSQL_HOST=$MYSQL_DB_IP" >> $GITHUB_ENV
          echo "MYSQL_USER=$MYSQL_GITHUB_ACTIONS_USER" >> $GITHUB_ENV
          echo "MYSQL_PASS=$MYSQL_GITHUB_ACTIONS_PASSWORD" >> $GITHUB_ENV
          echo "DB_DATABASE=$DB_DATABASE" >> $GITHUB_ENV
          echo "DB_USERNAME=$DB_USERNAME" >> $GITHUB_ENV
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV

          echo "::add-mask::$MYSQL_GITHUB_ACTIONS_PASSWORD"
          echo "::add-mask::$DB_PASSWORD"

      - name: Create MySQL resources
        run: |
          mysql --defaults-extra-file=<(printf "[client]\nuser=%s\npassword=%s\nhost=%s" "$MYSQL_USER" "$MYSQL_PASS" "$MYSQL_HOST") <<SQL
          CREATE DATABASE IF NOT EXISTS \`$DB_DATABASE\`;
          CREATE USER IF NOT EXISTS '$DB_USERNAME'@'%' IDENTIFIED BY '$DB_PASSWORD';
          GRANT ALL PRIVILEGES ON \`$DB_DATABASE\`.* TO '$DB_USERNAME'@'%';
          FLUSH PRIVILEGES;
          SQL

  deploy-application:
    needs: [build-production-image, prepare-database]
    runs-on: self-hosted
    env:
      DEPLOYMENT_ID: ${{ github.event.inputs.deployment_id || github.event.repository.name }}
      IMAGE_NAME: ${{ github.event.repository.name }}
      APP_TAG: ${{ github.sha }}
      ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Load environment variables
        run: |
          set -euo pipefail

          source ~/.github_secrets/global.env
          if [ -f ~/.github_secrets/apps/$DEPLOYMENT_ID-$ENVIRONMENT.env ]; then
            source ~/.github_secrets/apps/$DEPLOYMENT_ID-$ENVIRONMENT.env
          elif [ -f ~/.github_secrets/apps/$DEPLOYMENT_ID.env ]; then
            source ~/.github_secrets/apps/$DEPLOYMENT_ID.env
          fi

          echo "::add-mask::$DB_PASSWORD"
          echo "::add-mask::$APP_KEY"

          echo "APP_DOMAIN=$APP_DOMAIN" >> $GITHUB_ENV
          echo "APP_PORT=$APP_PORT" >> $GITHUB_ENV
          echo "MYSQL_HOST=$MYSQL_DB_IP" >> $GITHUB_ENV

          if [ -z "$APP_DOMAIN" ] || [ -z "$APP_PORT" ]; then
            echo "ERROR: APP_DOMAIN and APP_PORT must be set in env file"
            exit 1
          fi

          # Data directory — production uses base path, other envs get a suffix
          if [ "$ENVIRONMENT" = "production" ]; then
            DATA_DIR=~/data/$DEPLOYMENT_ID
          else
            DATA_DIR=~/data/$DEPLOYMENT_ID-$ENVIRONMENT
          fi

          # Persistent storage (uploads, private files — survives deploys)
          PERSISTENT_STORAGE=$DATA_DIR/storage_persistent
          mkdir -p "$PERSISTENT_STORAGE/app/public"
          mkdir -p "$PERSISTENT_STORAGE/app/private/livewire-tmp"
          chmod -R 777 "$PERSISTENT_STORAGE" 2>/dev/null || true

          if [ ! -f "$PERSISTENT_STORAGE/.migrated" ]; then
            echo "Migrating existing uploads to persistent storage..."
            LATEST_OLD_STORAGE=$(ls -dt $DATA_DIR/storage_* 2>/dev/null | grep -v storage_persistent | grep -v storage_cache_ | head -n 1 || true)
            if [ -n "${LATEST_OLD_STORAGE:-}" ] && [ -d "$LATEST_OLD_STORAGE/app/public" ]; then
              echo "Found old storage at: $LATEST_OLD_STORAGE"
              rsync -av "$LATEST_OLD_STORAGE/app/public/" "$PERSISTENT_STORAGE/app/public/" || true
              echo "Migration completed"
            fi
            touch "$PERSISTENT_STORAGE/.migrated"
          fi

          TIMESTAMP=$(date +%s)
          EPHEMERAL_STORAGE=$DATA_DIR/storage_cache_$TIMESTAMP
          mkdir -p "$EPHEMERAL_STORAGE/framework/cache"
          mkdir -p "$EPHEMERAL_STORAGE/framework/sessions"
          mkdir -p "$EPHEMERAL_STORAGE/framework/views"
          mkdir -p "$EPHEMERAL_STORAGE/logs"
          touch "$EPHEMERAL_STORAGE/logs/laravel.log"
          chmod -R 777 "$EPHEMERAL_STORAGE"

          echo "PERSISTENT_STORAGE=$PERSISTENT_STORAGE" >> $GITHUB_ENV
          echo "EPHEMERAL_STORAGE=$EPHEMERAL_STORAGE" >> $GITHUB_ENV
          echo "DATA_DIR=$DATA_DIR" >> $GITHUB_ENV

          if [ "$ENVIRONMENT" = "production" ]; then
            echo "CONTAINER_NAME=$DEPLOYMENT_ID" >> $GITHUB_ENV
          else
            echo "CONTAINER_NAME=$DEPLOYMENT_ID-$ENVIRONMENT" >> $GITHUB_ENV
          fi

      - name: Stop existing container
        run: |
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true

      - name: Deploy container
        run: |
          set -euo pipefail

          if [ -f ~/.github_secrets/apps/$DEPLOYMENT_ID-$ENVIRONMENT.env ]; then
            ENV_FILE=~/.github_secrets/apps/$DEPLOYMENT_ID-$ENVIRONMENT.env
          elif [ -f ~/.github_secrets/apps/$DEPLOYMENT_ID.env ]; then
            ENV_FILE=~/.github_secrets/apps/$DEPLOYMENT_ID.env
          else
            ENV_FILE=""
          fi

          if [ "${{ env.ENVIRONMENT }}" = "production" ]; then
            DOMAIN="${{ env.APP_DOMAIN }}"
          else
            DOMAIN="${{ env.ENVIRONMENT }}.${{ env.APP_DOMAIN }}"
          fi

          FIXED_CONTAINER_NAME=$(echo "${{ env.CONTAINER_NAME }}" | tr ' ' '-')

          ENV_FILE_RUN=$(mktemp)
          trap "rm -f $ENV_FILE_RUN" EXIT

          echo "APP_ENV=${{ env.ENVIRONMENT }}" >> "$ENV_FILE_RUN"

          if [ -n "$ENV_FILE" ]; then
            while IFS= read -r line || [[ -n "$line" ]]; do
              if [[ ! "$line" =~ ^#.* ]] && [[ -n "$line" ]]; then
                var_name=$(echo "$line" | cut -d= -f1)
                if [[ "$var_name" != "APP_DOMAIN" && "$var_name" != "APP_PORT" ]]; then
                  echo "$line" >> "$ENV_FILE_RUN"
                fi
              fi
            done < "$ENV_FILE"
          fi

          printf '%s\n' \
            "DB_HOST=10.0.0.5" \
            "DB_SOCKET=" \
            "QUEUE_CONNECTION=database" \
            "VIRTUAL_HOST=$DOMAIN" \
            "LETSENCRYPT_HOST=$DOMAIN" \
            "LETSENCRYPT_EMAIL=admin@dofus-temple.com" \
            "FORCE_HTTPS=true" \
            "TRUSTED_PROXIES=*" \
            "TRUST_ALL_PROXIES=true" \
            "APP_URL=https://$DOMAIN" \
            "SESSION_DOMAIN=$DOMAIN" \
            >> "$ENV_FILE_RUN"

          docker run -d \
            --name "$FIXED_CONTAINER_NAME" \
            --network proxy-network \
            -p ${{ env.APP_PORT }}:80 \
            -v "${{ env.PERSISTENT_STORAGE }}/app/public:/var/www/storage/app/public" \
            -v "${{ env.PERSISTENT_STORAGE }}/app/private:/var/www/storage/app/private" \
            -v "${{ env.EPHEMERAL_STORAGE }}/framework:/var/www/storage/framework" \
            -v "${{ env.EPHEMERAL_STORAGE }}/logs:/var/www/storage/logs" \
            --env-file "$ENV_FILE_RUN" \
            "localhost:5000/${{ env.IMAGE_NAME }}:${{ env.APP_TAG }}"

      - name: Verify deployment
        run: |
          sleep 5
          if ! docker inspect ${{ env.CONTAINER_NAME }} --format '{{.State.Running}}' | grep -q "true"; then
            echo "Container failed to start properly"
            docker logs ${{ env.CONTAINER_NAME }}
            exit 1
          fi
          echo "Container ${{ env.CONTAINER_NAME }} deployed successfully"

      - name: Health check
        run: |
          set -euo pipefail
          MAX_RETRIES=24
          RETRY_INTERVAL=5
          for ((i=1; i<=MAX_RETRIES; i++)); do
            HTTP_CODE="$(curl \
              --silent --show-error \
              --output /dev/null \
              --write-out '%{http_code}' \
              --connect-timeout 2 \
              --max-time 5 \
              --retry 0 \
              "http://127.0.0.1:${{ env.APP_PORT }}/health" || true)"
            if [[ -z "$HTTP_CODE" ]]; then HTTP_CODE="000"; fi
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "Application is healthy!"
              break
            fi
            echo "Waiting for app (attempt $i/$MAX_RETRIES), got HTTP $HTTP_CODE..."
            if [[ $i -eq $MAX_RETRIES ]]; then
              echo "Health check failed after $MAX_RETRIES attempts"
              docker logs --tail 300 "${{ env.CONTAINER_NAME }}" || true
              exit 1
            fi
            sleep "$RETRY_INTERVAL"
          done

      - name: Run database migrations
        run: |
          set -euo pipefail
          if ! docker exec ${{ env.CONTAINER_NAME }} php artisan migrate --force; then
            echo "Migration failed"
            docker logs ${{ env.CONTAINER_NAME }}
            exit 1
          fi

      - name: Optimize application
        run: |
          set -euo pipefail
          docker exec ${{ env.CONTAINER_NAME }} php artisan route:clear
          docker exec ${{ env.CONTAINER_NAME }} php artisan optimize
          echo "Optimization completed"

      - name: Cleanup old ephemeral cache dirs
        run: |
          set -euo pipefail
          APP_DIR="${{ env.DATA_DIR }}"
          CURRENT="${{ env.EPHEMERAL_STORAGE }}"
          mapfile -t TO_DELETE < <(
            ls -dt "$APP_DIR"/storage_cache_* 2>/dev/null \
              | grep -v "^$CURRENT$" \
              | tail -n +11 || true
          )
          if [ "${#TO_DELETE[@]}" -eq 0 ]; then
            echo "No old cache dirs to delete."
            exit 0
          fi
          printf '%s\n' "${TO_DELETE[@]}" > /tmp/storage_cache_delete_list.txt
          echo "Deleting ${#TO_DELETE[@]} old cache dirs..."
          docker run --rm \
            -v "$HOME/data:/hostdata" \
            -v /tmp/storage_cache_delete_list.txt:/delete_list.txt:ro \
            alpine:3.20 sh -lc '
              set -e
              while IFS= read -r p; do
                [ -n "$p" ] || continue
                rm -rf "$p"
              done < /delete_list.txt
            '
          rm -f /tmp/storage_cache_delete_list.txt
          echo "Cleanup complete."
