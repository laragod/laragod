<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#fff" stroke-width="1"/>
  </g>
  <!-- Glow -->
  <circle cx="400" cy="160" r="120" fill="#f59e0b" opacity="0.08"/>
  <circle cx="400" cy="160" r="60" fill="#f59e0b" opacity="0.05"/>
  <!-- Trophy icon -->
  <g transform="translate(365, 110)" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 2h34l-4 28H22L18 2z" opacity="0.9"/>
    <path d="M52 2c4 0 12 2 12 12s-8 14-12 16" opacity="0.7"/>
    <path d="M18 2c-4 0-12 2-12 12s8 14 12 16" opacity="0.7"/>
    <line x1="35" y1="30" x2="35" y2="42"/>
    <path d="M24 42h22c0 0 0 6-11 6s-11-6-11-6z"/>
  </g>
  <!-- Bar chart decoration -->
  <g transform="translate(280, 200)" opacity="0.15">
    <rect x="0" y="40" width="30" height="60" rx="4" fill="#f59e0b"/>
    <rect x="40" y="20" width="30" height="80" rx="4" fill="#f59e0b"/>
    <rect x="80" y="0" width="30" height="100" rx="4" fill="#f59e0b"/>
    <rect x="120" y="30" width="30" height="70" rx="4" fill="#f59e0b"/>
    <rect x="160" y="10" width="30" height="90" rx="4" fill="#f59e0b"/>
    <rect x="200" y="50" width="30" height="50" rx="4" fill="#f59e0b"/>
  </g>
  <!-- Title -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="32" fill="#f59e0b" letter-spacing="2">SKILL PEAK</text>
  <text x="400" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="14" fill="#94a3b8" letter-spacing="4">RANKING SYSTEM</text>
</svg>