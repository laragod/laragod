<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#141428"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Wireframe grid -->
  <g opacity="0.06" stroke="#06b6d4" stroke-width="0.5" fill="none">
    <path d="M200 280 L400 180 L600 280 Z"/>
    <path d="M250 260 L400 200 L550 260 Z"/>
    <path d="M300 240 L400 210 L500 240 Z"/>
    <line x1="200" y1="280" x2="250" y2="260"/>
    <line x1="400" y1="180" x2="400" y2="210"/>
    <line x1="600" y1="280" x2="550" y2="260"/>
  </g>
  <!-- Glow -->
  <circle cx="400" cy="155" r="80" fill="#06b6d4" opacity="0.06"/>
  <!-- 3D cube icon -->
  <g transform="translate(365, 100)" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linejoin="round" opacity="0.8">
    <!-- Front face -->
    <path d="M35 15 L60 30 L60 65 L35 80 L10 65 L10 30 Z"/>
    <!-- Top edges -->
    <line x1="35" y1="15" x2="35" y2="48"/>
    <line x1="10" y1="30" x2="35" y2="48"/>
    <line x1="60" y1="30" x2="35" y2="48"/>
    <!-- Vertices -->
    <circle cx="35" cy="15" r="2.5" fill="#06b6d4" opacity="0.5"/>
    <circle cx="60" cy="30" r="2.5" fill="#06b6d4" opacity="0.5"/>
    <circle cx="10" cy="30" r="2.5" fill="#06b6d4" opacity="0.5"/>
    <circle cx="35" cy="80" r="2.5" fill="#06b6d4" opacity="0.5"/>
  </g>
  <!-- Floating particles -->
  <g fill="#06b6d4" opacity="0.2">
    <circle cx="200" cy="100" r="2"/><circle cx="600" cy="120" r="1.5"/>
    <circle cx="150" cy="250" r="1.5"/><circle cx="650" cy="220" r="2"/>
    <circle cx="300" cy="80" r="1"/><circle cx="520" cy="90" r="1.5"/>
  </g>
  <!-- Title -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="32" fill="#06b6d4" letter-spacing="3">PERSIU STUDIO</text>
  <text x="400" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="14" fill="#6b7280" letter-spacing="4">3D DESIGN</text>
</svg>