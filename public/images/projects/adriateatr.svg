<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="100%" style="stop-color:#2d1515"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <linearGradient id="curtain-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#991b1b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7f1d1d;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="curtain-r" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#991b1b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7f1d1d;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Curtains -->
  <path d="M0 0 Q80 200 0 400 Z" fill="url(#curtain-l)"/>
  <path d="M800 0 Q720 200 800 400 Z" fill="url(#curtain-r)"/>
  <!-- Stage top -->
  <path d="M100 30 Q400 60 700 30" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.2"/>
  <path d="M80 25 Q400 55 720 25" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.1"/>
  <!-- Spotlight -->
  <circle cx="400" cy="150" r="100" fill="#dc2626" opacity="0.05"/>
  <circle cx="400" cy="150" r="50" fill="#dc2626" opacity="0.04"/>
  <!-- Theatre masks -->
  <g transform="translate(360, 110)" opacity="0.8">
    <!-- Happy mask -->
    <g fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round">
      <ellipse cx="20" cy="25" rx="22" ry="28"/>
      <circle cx="13" cy="18" r="3" fill="#dc2626" opacity="0.4"/>
      <circle cx="27" cy="18" r="3" fill="#dc2626" opacity="0.4"/>
      <path d="M10 32 Q20 42 30 32"/>
    </g>
    <!-- Sad mask -->
    <g fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" transform="translate(38, 5)">
      <ellipse cx="20" cy="25" rx="22" ry="28"/>
      <circle cx="13" cy="18" r="3" fill="#dc2626" opacity="0.4"/>
      <circle cx="27" cy="18" r="3" fill="#dc2626" opacity="0.4"/>
      <path d="M10 38 Q20 28 30 38"/>
    </g>
  </g>
  <!-- Title -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="32" fill="#dc2626" letter-spacing="2">ADRIA TEATR</text>
  <text x="400" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="14" fill="#6b7280" letter-spacing="4">THEATRE</text>
</svg>