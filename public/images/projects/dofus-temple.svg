    <line x1="30" y1="0" x2="30" y2="54"/>
    <path d="M8 12h16" opacity="0.5"/>
    <path d="M8 20h16" opacity="0.5"/>
    <path d="M8 28h16" opacity="0.5"/>
    <path d="M36 12h16" opacity="0.5"/>
    <path d="M36 20h16" opacity="0.5"/>
    <path d="M36 28h16" opacity="0.5"/>
  </g>
  <!-- SEO graph decoration -->
  <g transform="translate(240, 210)" opacity="0.12">
    <polyline points="0,80 40,70 80,50 120,60 160,30 200,40 240,15 280,20 320,5" fill="none" stroke="#22c55e" stroke-width="3"/>
    <circle cx="320" cy="5" r="5" fill="#22c55e"/>
  </g>
  <!-- Title -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="32" fill="#22c55e" letter-spacing="2">DOFUS TEMPLE</text>
  <text x="400" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="14" fill="#6b7280" letter-spacing="4">SEO BLOG</text>
